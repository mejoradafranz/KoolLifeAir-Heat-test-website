<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ — Kool Life Air &amp; Heat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:#1A1F18;color:#fff;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E")}
    .page-hero{min-height:420px;display:flex;align-items:center;padding:120px 24px 80px;position:relative}
    .page-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(120,226,5,0.2) 30%,rgba(120,226,5,0.2) 70%,transparent)}
    .container{max-width:1280px;margin:0 auto}
    .breadcrumb{font-size:13px;color:rgba(255,255,255,0.35);margin-bottom:20px}.breadcrumb a{color:rgba(255,255,255,0.35);text-decoration:none}.breadcrumb a:hover{color:#78E205}
    .badge{display:inline-flex;background:rgba(120,226,5,0.1);border:1px solid rgba(120,226,5,0.25);border-radius:100px;padding:6px 18px;margin-bottom:20px;font-size:12px;font-weight:700;color:#78E205;letter-spacing:0.1em}
    h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(44px,5.5vw,76px);line-height:0.95;letter-spacing:-0.02em;margin-bottom:20px}
    .lead{font-size:17px;line-height:1.75;color:rgba(255,255,255,0.7);max-width:600px;margin-bottom:36px}
    .btn-primary{display:inline-flex;align-items:center;gap:10px;background:#78E205;color:#1A1F18;font-size:15px;font-weight:700;padding:14px 28px;border-radius:10px;text-decoration:none;transition:transform 0.2s,box-shadow 0.2s}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(120,226,5,0.3)}
    .btn-outline{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,0.05);color:#fff;font-size:15px;font-weight:600;padding:14px 28px;border-radius:10px;text-decoration:none;border:1px solid rgba(255,255,255,0.15)}
    section{padding:80px 24px}
    .section-label{display:inline-flex;background:rgba(120,226,5,0.08);border:1px solid rgba(120,226,5,0.2);border-radius:100px;padding:5px 16px;font-size:11px;font-weight:700;color:#78E205;letter-spacing:0.1em;margin-bottom:16px}
    h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(34px,3.5vw,52px);line-height:1;letter-spacing:-0.01em;margin-bottom:16px}
    .card{background:#242B20;border:1px solid rgba(120,226,5,0.1);border-radius:18px;padding:28px}
    .cta-band{background:linear-gradient(135deg,#242B20,#151A12);border-top:1px solid rgba(120,226,5,0.1);padding:60px 24px;text-align:center}

    .faq-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:48px}
    @media(max-width:768px){.faq-grid{grid-template-columns:1fr}}
    .faq-card{background:#242B20;border:1px solid rgba(120,226,5,0.1);border-radius:16px;padding:28px}
    .faq-q{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#78E205;letter-spacing:0.02em;margin-bottom:12px;line-height:1.1}
    .faq-a{font-size:14px;color:rgba(255,255,255,0.75);line-height:1.75}
    .faq-tag{display:inline-flex;background:rgba(120,226,5,0.06);border:1px solid rgba(120,226,5,0.15);border-radius:100px;padding:3px 10px;font-size:10px;font-weight:700;color:rgba(120,226,5,0.7);letter-spacing:0.08em;margin-bottom:10px}
    .category-nav{display:flex;flex-wrap:wrap;gap:10px;margin-top:32px}
    .cat-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:8px 18px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.75);cursor:default}
    .cat-btn.active{background:rgba(120,226,5,0.1);border-color:rgba(120,226,5,0.3);color:#78E205}
  </style>
</head>
<body>
<div id="site-nav"></div>

<!-- Hero -->
<section class="page-hero" style="background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(120,226,5,0.08) 0%,transparent 70%),#1A1F18">
  <div class="container">
    <div class="breadcrumb"><a href="/">Home</a> &rsaquo; <a href="/about.html">About Us</a> &rsaquo; FAQ</div>
    <div class="badge">FAQ</div>
    <h1>Frequently Asked<br>Questions</h1>
    <p class="lead">We've compiled answers to the questions we hear most often. Can't find what you're looking for? Give us a call — we're always happy to help.</p>
    <div style="display:flex;gap:14px;flex-wrap:wrap;">
      <a href="tel:+13212076757" class="btn-primary">Call Us &#8594;</a>
      <a href="/contact.html" class="btn-outline">Contact Us</a>
    </div>
  </div>
</section>


<div id="site-footer"></div>
<script src="/nav.js"></script>
</body>
</html>
